<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BrailleGen 10B is a fast, offline web application that generates highly customizable 3D printable Braille STL files from text.">
    <meta name="keywords" content="Braille, 3D Printing, STL, Generator, Translator, liblouis">
    <meta property="og:title" content="BrailleGen 10B">
    <meta property="og:description" content="Generate 3D printable Braille models directly in your browser. Fully offline and customizable.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="assets/xxxxxx.png">
    <title>BrailleGen 10B</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('assets/RobotoMono-VariableFont_wght.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'CustomFont', sans-serif;
            background-color: #f0f0f0;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .window {
            background: #f0f0f0;
            border: 1px solid #ccc;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 650px;
            transition: max-width 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .window.wide {
            max-width: 800px;
        }

        .content {
            padding: 15px 20px;
        }

        h2 {
            font-size: 22px;
            margin: 0 0 15px 0;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        /* Top Section Layout */
        .top-section {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .text-input-row {
            display: flex;
            margin-bottom: 15px;
        }

        .text-input-row label {
            font-weight: bold;
            font-size: 16px;
            width: 140px;
            flex-shrink: 0;
        }

        textarea {
            flex-grow: 1;
            height: 80px;
            resize: vertical;
            padding: 4px;
            font-family: inherit;
            border: 1px solid #a0a0a0;
        }

        .generate-row {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        /* Settings Grid Layout */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            column-gap: 15px;
            row-gap: 12px;
            align-items: center;
        }

        .settings-grid label {
            font-weight: bold;
            font-size: 15px;
        }

        .settings-grid input[type="number"], 
        .settings-grid select,
        .settings-grid input[type="text"] {
            padding: 4px;
            border: 1px solid #a0a0a0;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .checkbox-row {
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            margin-top: 5px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-row .main-label {
            font-weight: bold;
            font-size: 15px;
            width: 190px;
            flex-shrink: 0;
        }

        .checkbox-row label {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .checkbox-row input[type="checkbox"] {
            margin-right: 5px;
        }

        /* Buttons */
        button {
            background-color: #ffffff;
            color: #000;
            border: 1px solid #a0a0a0;
            padding: 6px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        button:hover:not(:disabled) {
            background-color: #e6e6e6;
        }

        button:active:not(:disabled) {
            background-color: #cccccc;
        }

        button:disabled {
            color: #888;
            cursor: not-allowed;
        }

        #generateBtn {
            font-size: 18px;
            padding: 8px 30px;
        }

        #defaultsBtn {
            font-size: 14px;
            padding: 4px 12px;
        }

        /* Status & Console */
        .status-bar {
            padding: 4px 10px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #d9d9d9;
            background-color: #f0f0f0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #e0e0e0;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 14px;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid transparent;
            margin-bottom: -1px;
            outline: none;
        }

        .tab:hover {
            background-color: #d0d0d0;
        }

        .tab.active {
            background-color: #f0f0f0;
            font-weight: bold;
            border-bottom: 1px solid #f0f0f0;
        }

        .github-link {
            margin-left: auto;
            padding: 8px 16px;
            font-size: 14px;
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .github-link:hover {
            background-color: #d0d0d0;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            flex-grow: 1;
        }

        .tab-content.active {
            display: flex;
        }

        #output {
            width: 100%;
            background-color: #1e1e1e;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 8px;
            border: none;
            resize: none;
            box-sizing: border-box;
            outline: none;
            margin: 0;
            flex-grow: 1;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <!-- Visually hidden H1 for SEO and Screen Readers -->
    <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">BrailleGen 10B - 3D Printable Braille STL Generator</h1>

    <div class="window">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('tab-generator', this)">Generator</button>
            <button class="tab" onclick="switchTab('tab-docs', this)">Documentation</button>
            <button class="tab" onclick="switchTab('tab-console', this)">Console</button>
            <button class="tab" onclick="switchTab('tab-license', this)">License</button>
            <!-- Added GitHub link aligned to the right side of the tab bar -->
            <a href="https://github.com/Richhe01/braillegen_10" class="github-link" target="_blank" aria-label="View source on GitHub">GitHub</a>
        </div>

        <div id="tab-generator" class="tab-content active">
            <div class="content">
            <div role="group" aria-labelledby="heading-translation">
                <h2 id="heading-translation">Translation parameters:</h2>
                <div class="top-section">
                    <div class="text-input-row">
                        <label for="textInput">Enter text:</label>
                        <textarea id="textInput">hello world</textarea>
                    </div>
                    <div class="generate-row">
                        <button id="generateBtn" disabled>Generate</button>
                    </div>
                </div>
            </div>

            <div role="group" aria-labelledby="heading-tile">
                <div class="section-header">
                    <h2 id="heading-tile">Braille tile parameters:</h2>
                    <button id="defaultsBtn">Defaults</button>
                </div>
                
                <div class="settings-grid">
                    <label for="charsPerLine">Characters per line:</label>
                    <input type="number" id="charsPerLine" value="32">

                    <label for="brailleTable">Choose braille table:</label>
                    <select id="brailleTable">
                        <option value="en-ueb-g2.ctb" selected>en-ueb-g2.ctb</option>
                        <option value="en-ueb-g1.ctb">en-ueb-g1.ctb</option>
                        <option value="es-g1.ctb">es-g1.ctb</option>
                        <option value="es-g2.ctb">es-g2.ctb</option>
                        <option value="fr-bfu-g2.ctb">fr-bfu-g2.ctb</option>
                    </select>

                <label for="brailleHeight">Braille height mm:</label>
                <input type="number" id="brailleHeight" value="0.6" step="0.1">

                <label for="plateHeight">Plate height mm:</label>
                <input type="number" id="plateHeight" value="1" step="0.1">

                <label for="lineSpacing">Line spacing mm:</label>
                <input type="number" id="lineSpacing" value="3.72" step="0.01">

                <label for="marginSize">Margin size mm:</label>
                <input type="number" id="marginSize" value="1" step="0.1">

                <label for="stlScale">STL export scale:</label>
                <input type="number" id="stlScale" value="1" step="0.1">

                <div class="checkbox-row">
                    <div class="main-label">Enable/Disable:</div>
                    <label><input type="checkbox" id="slabMode"> Slab mode</label>
                    <label><input type="checkbox" id="verticalExport"> Vertical export</label>
                </div>
            </div>
        </div>
            </div>
            <div class="status-bar" id="statusBar">BrailleGen loading WASM...</div>
        </div>

        <div id="tab-docs" class="tab-content">
            <!-- Replace this URL with your actual published Google Doc embed URL -->
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSW58YO02QIHbZbsao0XwDgwoOG_gqLRO66WPePjjpPT2AYRI3-uGR6LTb3M6we0ScXPiWs72HKrotx/pub?embedded=true" style="width:100%; height: 500px; border: none;" title="App Documentation"></iframe>
        </div>

        <div id="tab-console" class="tab-content">
            <textarea id="output" readonly placeholder="Console output...">BrailleGen Console Initialized.
</textarea>
        </div>

        <div id="tab-license" class="tab-content">
            <iframe src="LICENSE.md?v=2" style="width:100%; height: 500px; border: none;" title="License Document"></iframe>
        </div>
    </div>

    <script>
        function switchTab(tabId, tabButton) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            tabButton.classList.add('active');

            if (tabId === 'tab-docs') {
                document.querySelector('.window').classList.add('wide');
            } else {
                document.querySelector('.window').classList.remove('wide');
            }
        }

        const outputElement = document.getElementById('output');
        const statusBar = document.getElementById('statusBar');

        function validateInputs() {
            let errors = [];

            const text = document.getElementById('textInput').value;
            const bh = parseFloat(document.getElementById('brailleHeight').value);
            const ph = parseFloat(document.getElementById('plateHeight').value);
            const ls = parseFloat(document.getElementById('lineSpacing').value);
            const ms = parseFloat(document.getElementById('marginSize').value);
            const es = parseFloat(document.getElementById('stlScale').value);

            if (text.trim() === "") {
                errors.push("Text input can not be blank");
            }
            if (isNaN(bh) || bh < 0.4) {
                errors.push("Braille height must be greater than or equal to 0.4");
            }
            if (isNaN(ph) || ph < 0) {
                errors.push("Plate height must be greater than or equal to 0");
            }
            if (isNaN(ls) || ls < 0.1) {
                errors.push("Line spacing must be greater than or equal to 0.1");
            }
            if (isNaN(ms) || ms < 0) {
                errors.push("Margin size must be greater than or equal to 0");
            }
            if (isNaN(es) || es < 0.01) {
                errors.push("Export scale must be greater than or equal to 0.01");
            }

            return errors;
        }

        // Emscripten Module Setup

        var Module = {
            print: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
                if (outputElement) {
                    outputElement.value += text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight; 
                }
            },
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
                if (outputElement) {
                    outputElement.value += "[ERROR] " + text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight; 
                }
            },

            
            onRuntimeInitialized: () => {
                const btn = document.getElementById('generateBtn');
                btn.disabled = false; 
                statusBar.innerText = "BrailleGen ready!";

                btn.addEventListener('click', () => {

                    // 1. Run validation first (validate chars per line in c++ after text is translated))
                    const validationErrors = validateInputs();
                    
                    if (validationErrors.length > 0) {
                        // Print errors to the status bar and console, then abort
                        statusBar.innerText = "Validation failed. See console.";
                        validationErrors.forEach(err => Module.printErr(err));
                        return; 
                    }
                    statusBar.innerText = "Generating...";
                    
                    // 2. Gather all inputs for your C++ program
                    const params = {
                        text: document.getElementById('textInput').value,
                        charsPerLine: parseInt(document.getElementById('charsPerLine').value),
                        brailleTable: document.getElementById('brailleTable').value,
                        brailleHeight: parseFloat(document.getElementById('brailleHeight').value),
                        plateHeight: parseFloat(document.getElementById('plateHeight').value),
                        lineSpacing: parseFloat(document.getElementById('lineSpacing').value),
                        marginSize: parseFloat(document.getElementById('marginSize').value),
                        stlScale: parseFloat(document.getElementById('stlScale').value),
                        slabMode: document.getElementById('slabMode').checked,
                        verticalExport: document.getElementById('verticalExport').checked
                    };

                    console.log("Sending parameters to C++:", params);

                    // 2. Trigger the C++ STL generation
                    const generatedFileName = Module.ccall('generateBrailleSTL', 'string', 
                        ['string', 'number', 'string', 'number', 'number', 'number', 'number', 'number', 'boolean', 'boolean'], 
                        [params.text, params.charsPerLine, params.brailleTable, params.brailleHeight, params.plateHeight, params.lineSpacing, params.marginSize, params.stlScale, params.slabMode, params.verticalExport]
                    );
                    
                    if (!generatedFileName) {
                        statusBar.innerText = "Error: No braille text generated.";
                        return;
                    }

                    // 3. Read the generated STL from Emscripten VFS
                    try {
                        const stlData = Module.FS.readFile(generatedFileName);
                        const blob = new Blob([stlData], { type: 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        
                        // Perform a hidden "click" to prompt the download
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = generatedFileName;
                        a.click();
                        URL.revokeObjectURL(url);
                        
                        statusBar.innerText = "Download complete. BrailleGen ready!";
                    } catch (e) {
                        console.error("Error reading " + generatedFileName + ":", e);
                        Module.printErr("Error reading " + generatedFileName + ": " + e);
                        statusBar.innerText = "Error generating file.";
                    }
                });

                // Optional: Setup "Defaults" button
                document.getElementById('defaultsBtn').addEventListener('click', () => {
                    document.getElementById('charsPerLine').value = 32;
                    document.getElementById('brailleTable').value = "en-ueb-g2.ctb";
                    document.getElementById('brailleHeight').value = 0.6;
                    document.getElementById('plateHeight').value = 1;
                    document.getElementById('lineSpacing').value = 3.72;
                    document.getElementById('marginSize').value = 1;
                    document.getElementById('stlScale').value = 1;
                    document.getElementById('slabMode').checked = false;
                    document.getElementById('verticalExport').checked = false;
                    Module.print("Restored default parameters.");
                });
            }
        };
    </script>
    
    <script src="index.js"></script>
</body>
</html>
