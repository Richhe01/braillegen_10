<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Braille Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        /* Styling for the C++ Output Box */
        #output {
            width: 100%;
            height: 250px;
            margin-top: 20px;
            background-color: #1e1e1e;
            color: #00ff00; /* Hacker green text! */
            font-family: 'Lucida Console', Monaco, monospace;
            padding: 10px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
            resize: vertical;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Liblouis WebAssembly</h1>
        <p>This is my custom user interface. The C++ standard output is routed to the box below.</p>
        
        <textarea id="output" readonly></textarea>
    </div>

    <script type='text/javascript'>
        var outputElement = document.getElementById('output');
        
        // Clear the box on page load
        if (outputElement) outputElement.value = ''; 

        // Define the Emscripten Module
        var Module = {
            print: function(...args) {
                var text = args.join(' ');
                console.log(text); // Keep it in the F12 console just in case
                
                if (outputElement) {
                    outputElement.value += text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight; // Auto-scroll to bottom
                }
            },
            printErr: function(...args) {
                // Route C++ std::cerr to the same box, but you could handle it differently
                var text = args.join(' ');
                console.error(text);
                if (outputElement) {
                    outputElement.value += "[ERROR] " + text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight;
                }
            }
        };
    </script>

    <script async type="text/javascript" src="index.js"></script>

</body>
</html>
